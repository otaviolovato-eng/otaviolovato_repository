<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copa do Mundo 2026 - Central de Jogos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>🏆 Copa do Mundo 2026</h1>
            <p id="rodada-atual">Rodada Atual: Carregando...</p>
        </div>
    </header>

    <main class="container">
        <section id="jogos">
            <h2>Próximos Jogos & Resultados</h2>
            <div id="lista-jogos" class="grid-jogos">
                </div>
        </section>

        <section id="classificacao">
            <h2>Tabela de Pontuação - Grupo A</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Pos</th>
                            <th>Seleção</th>
                            <th>Pts</th>
                            <th>J</th>
                            <th>V</th>
                            <th>E</th>
                            <th>D</th>
                            <th>SG</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-corpo">
                        </tbody>
                </table>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Central da Copa. Todos os direitos reservados.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
